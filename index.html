<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haftasonu Planı</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        .buttons {
            margin-top: 30px;
            position: relative;
            height: 100px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            transition: 0.3s;
        }
        #yesBtn {
            background-color: #4CAF50;
            color: white;
            margin-right: 20px;
        }
        #noBtn {
            background-color: #f44336;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="question">Bu haftasonu boş musun? 😊</h1>
    <div class="buttons">
        <button id="yesBtn" onclick="celebrate()">Evet</button>
        <button id="noBtn" onmouseover="moveButton()">Hayır</button>
    </div>
</div>

<script>
    function moveButton() {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);
        const noBtn = document.getElementById('noBtn');
        noBtn.style.left = x + 'px';
        noBtn.style.top = y + 'px';
    }

    function celebrate() {
        document.getElementById('question').innerHTML = "Harika! O zaman planı yapıyoruz! 🎉";
        document.querySelector('.buttons').style.display = 'none';
    }
</script>

</body>
</html>
